<script>
$(document).ready(function() {
    const bookList = $('#book-list');
    const searchInput = $('#search-input');
    const styleFilter = $('#style-filter');
    const difficultyFilter = $('#difficulty-filter');
    const sortOrder = $('#sort-order');
    let allBooks = [];
    let originalOrder = [];

    function renderBooks(booksToRender) {
        bookList.empty();
        if (booksToRender.length === 0) {
            bookList.html('<div class="col-lg-12"><p class="text-center py-5">Aramanızla eşleşen kitap bulunamadı.</p></div>');
            return;
        }
        booksToRender.forEach((book, index) => {
            const testsHtml = book.tests.length > 0 
                ? book.tests.map(test => `<a href="${test.link}" class="list-group-item list-group-item-action py-2" target="_blank"><i class="fa fa-file-pdf-o text-danger me-2"></i>${test.name}</a>`).join('')
                : '<p class="p-3">Bu kitap için henüz test eklenmemiş.</p>';

            // Buttons Rework: Only View/Download
            let buttonsHtml = `
                <div class="d-flex w-100 gap-2">
                    <button class="btn btn-primary view-tests shadow-sm flex-grow-1">
                        <i class="fa fa-download me-2"></i>Dosyaları Görüntüle
                    </button>
                </div>
            `;

            let badgeHtml = '';
            if (book.badges && book.badges.length > 0) {
                const badgeContainer = book.badges.map(badge => 
                    `<div class="book-badge" style="background-color: ${badge.color}">${badge.text}</div>`
                ).join('');
                badgeHtml = `<div class="badge-container">${badgeContainer}</div>`;
            }
            
            const difficultyPercentage = (book.difficulty / 8) * 100;

            const bookCardHtml = `
                <div class="col-lg-3 col-md-4 col-sm-6 hero-feature mb-4">
                    <div class="thumbnail h-100 d-flex flex-column shadow-sm border-0" style="border-radius: 12px; overflow: hidden; background: #fff;">
                        <div class="image-container overflow-hidden" style="height: 350px;">
                            ${badgeHtml}
                            <a href="#book-details-modal" class="fancybox-book-details" data-book-index="${index}">
                                <img src="../${book.image}" alt="${book.title}" loading="lazy" class="img-fluid w-100 h-100 object-fit-cover transition-img">
                            </a>
                        </div>
                        <div class="caption p-3 d-flex flex-column flex-grow-1">
                            <div class="mb-auto">
                                <h3 class="mb-2" style="font-size: 1.1rem; font-weight: 700; height: 2.6rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3;">${book.title}</h3>
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="badge bg-light text-dark border fw-normal">${book.style}</span>
                                    <div class="text-end">
                                        <div class="difficulty-bar" style="width: 50px; height: 4px; margin-top: 0;">
                                            <div class="difficulty-level" style="width: ${difficultyPercentage}%;"></div>
                                        </div>
                                        <small class="text-muted" style="font-size: 0.65rem;">Zorluk: ${book.difficulty}/8</small>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-2">
                                ${buttonsHtml}
                            </div>
                        </div>
                        <div class="tests-wrapper border-top bg-light" style="display: none;">
                            <h6 class="px-3 pt-3 mb-1 fw-bold" style="font-size: 0.8rem; color: #14A085;">Dosyaları İndir</h6>
                            <div class="tests-container list-group list-group-flush border-0">${testsHtml}</div>
                        </div>
                    </div>
                </div>
            `;
            bookList.append(bookCardHtml);
        });

        $('.fancybox-book-details').fancybox({
            beforeLoad: function() {
                const bookIndex = $(this.element).data('book-index');
                const book = allBooks[bookIndex];
                $('#modal-book-image').attr('src', '../' + book.image);
                $('#modal-book-title').text(book.title);
                $('#modal-book-style').text(book.style);
                $('#modal-book-description').text(book.description || 'Açıklama bulunmuyor.');
                $('#modal-book-difficulty').text(book.difficulty);
                const difficultyPercentage = (book.difficulty / 8) * 100;
                $('#modal-difficulty-level').css('width', difficultyPercentage + '%');
            }
        });
    }

    function applyFiltersAndSort() {
        const searchTerm = searchInput.val().toLowerCase();
        const selectedStyle = styleFilter.val();
        const selectedDifficulty = difficultyFilter.val();
        const selectedSort = sortOrder.val();
        let processedBooks = [...allBooks];

        processedBooks = processedBooks.filter(book => {
            const titleMatch = book.title.toLowerCase().includes(searchTerm);
            const styleMatch = !selectedStyle || book.style === selectedStyle;
            const difficultyMatch = !selectedDifficulty || (
                selectedDifficulty === '1-3' && book.difficulty >= 1 && book.difficulty <= 3 ||
                selectedDifficulty === '4-6' && book.difficulty >= 4 && book.difficulty <= 6 ||
                selectedDifficulty === '7-8' && book.difficulty >= 7 && book.difficulty <= 8
            );
            return titleMatch && styleMatch && difficultyMatch;
        });

        if (selectedSort === 'difficulty-asc') processedBooks.sort((a, b) => a.difficulty - b.difficulty);
        else if (selectedSort === 'difficulty-desc') processedBooks.sort((a, b) => b.difficulty - a.difficulty);
        else if (selectedSort === 'title-asc') processedBooks.sort((a, b) => a.title.localeCompare(b.title));
        else if (selectedSort === 'title-desc') processedBooks.sort((a, b) => b.title.localeCompare(a.title));
        
        renderBooks(processedBooks);
    }

    bookList.on('click', '.view-tests', function(e) {
        e.preventDefault();
        $(this).closest('.thumbnail').find('.tests-wrapper').slideToggle();
    });

    searchInput.on('keyup', applyFiltersAndSort);
    styleFilter.on('change', applyFiltersAndSort);
    difficultyFilter.on('change', applyFiltersAndSort);
    sortOrder.on('change', applyFiltersAndSort);

    $.getJSON('../data/books.json', function(data) {
        allBooks = data;
        const styles = [...new Set(allBooks.map(book => book.style))];
        styles.forEach(style => styleFilter.append(`<option value="${style}">${style}</option>`));
        renderBooks(allBooks);
    });
});
</script>
